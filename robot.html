<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星语智问</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }
        body {
            background-color: #fdfaf5;
            color: #333;
            line-height: 1.8;
        }
        nav {
            width: 100%;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 15px rgba(0,0,0,0.06);
            position: sticky;
            top: 0;
            z-index: 999;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #8b4e1a;
            letter-spacing: 1px;
        }
        .nav-links {
            display: flex;
            gap: 26px;
        }
        .nav-links a {
            text-decoration: none;
            color: #444;
            font-size: 15px;
            position: relative;
            transition: 0.3s;
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: #8b4e1a;
            transition: 0.3s;
        }
        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }
        .nav-links a:hover, .nav-links a.active {
            color: #8b4e1a;
            font-weight: 500;
        }
        section {
            padding: 80px 5%;
        }
        .section-title {
            text-align: center;
            font-size: 34px;
            color: #8b4e1a;
            margin-bottom: 8px;
            letter-spacing: 1.5px;
            font-weight: 600;
        }
        .line-decorate {
            width: 70px;
            height: 3px;
            background: linear-gradient(to right, #8b4e1a, #c18a56);
            margin: 12px auto 35px;
            border-radius: 2px;
        }
        .cn-text {
            text-align:center;
            text-indent:0;
            margin-bottom:20px;
            max-width: 1050px;
            margin: 0 auto 30px;
            font-size: 16px;
            color: #444;
        }
        /* 聊天框整体样式 */
        .chat-container {
            max-width: 820px;
            margin: 0 auto;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(139,78,26,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 620px;
        }
        /* 顶部标题栏 */
        .chat-header {
            background: #8b4e1a;
            color: #fff;
            padding: 20px 24px;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .chat-header::before {
            content: "🤖";
            font-size: 24px;
        }
        /* 聊天消息区域 */
        .chat-box {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            background: #fdfaf5;
        }
        /* 消息气泡通用 */
        .message {
            margin-bottom: 20px;
            max-width: 78%;
            padding: 14px 18px;
            border-radius: 18px;
            line-height: 1.75;
            font-size: 15px;
        }
        /* 机器人消息（浅米色） */
        .bot-message {
            background: #f0e8dd;
            color: #333;
            border-top-left-radius: 4px;
        }
        /* 用户提问（深棕色） */
        .user-message {
            background: #8b4e1a;
            color: #fff;
            margin-left: auto;
            border-top-right-radius: 4px;
        }
        /* 底部输入栏 */
        .chat-input {
            display: flex;
            padding: 18px;
            background: #fff;
            border-top: 1px solid #eee;
            gap: 14px;
        }
        .chat-input input {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid #e0d4c6;
            border-radius: 50px;
            outline: none;
            font-size: 15px;
            background: #fdfaf5;
        }
        .chat-input button {
            padding: 14px 32px;
            background: #8b4e1a;
            color: #fff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        .chat-input button:hover {
            background: #6d3c11;
        }
        footer {
            background-color: #4a3322;
            color: #fff;
            padding: 40px 5%;
            margin-top: 60px;
            text-align: center;
        }
        .copyright {
            width:100%;
            text-align:center;
            padding:18px;
            background-color:#352519;
            color:#bbb;
            font-size:14px;
        }
        @media(max-width:768px){
            .nav-links{gap:12px; font-size:13px;}
            .section-title {font-size: 28px;}
            .chat-container {height: 520px;}
        }
    </style>
</head>
<body>
<nav>
    <div class="logo">非遗·星语传薪</div>
    <div class="nav-links">
        <a href="index.html">传薪首页</a>
        <a href="library.html">匠艺藏珍</a>
        <a href="video.html">匠作影录</a>

        <a href="result.html">传薪成果</a>
        <a href="team.html">薪火同路人</a>
        <a href="contact.html">来信相叙</a>
    </div>
</nav>

<section>
    <h2 class="section-title">🤖 星语智问</h2>
    <div class="line-decorate"></div>
    <p class="cn-text">
        智能非遗问答助手，覆盖传统手工、民俗戏曲、文化传承、非遗保护全领域，随时为你解答各类传统文化疑问。
    </p>
    <div class="chat-container">
        <div class="chat-header">非遗文化小助手</div>
        <div class="chat-box" id="chatBox">
            <div class="message bot-message">
                你好！我是星语非遗智能助手，你可以向我提问：什么是非遗、四大名绣、剪纸寓意、苏绣陶艺、东阳木雕、扎染工艺、戏曲脸谱、传统民俗节日、非遗传承价值、古法香料、传统榫卯家具、民俗礼仪、非遗保护政策、传统年画、皮影戏等相关传统文化问题~
            </div>
        </div>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="输入你的问题，按回车发送">
            <button onclick="sendMsg()">发送</button>
        </div>
    </div>
</section>

<footer>
    <h3>星语传薪 - 中华非遗文脉新声</h3>
</footer>
<div class="copyright">
    © 2026 星语传薪 非遗传承项目 版权所有
</div>

<script>
    // 扩充全范围问答知识库，回答内容详细丰富
    const answerLib = {
        "什么是非遗": "非物质文化遗产，简称非遗，是各族人民世代相传并视为其文化遗产组成部分的各种传统文化表现形式。主要包含五大类别：传统口头文学及语言、传统美术与传统技艺、传统音乐戏曲舞蹈、传统民俗礼仪节庆、传统体育游艺。它不依托实物存在，依靠人代代口传心授，是中华民族鲜活、流动的文化基因，承载着各地独有的生活习俗与审美智慧。",
        "为什么要保护非遗": "第一，非遗是民族文化根脉，留存着中国人千年的生活记忆、审美习惯与精神信仰，是区分民族文化身份的核心标识；第二，多数传统手艺依赖匠人手工传承，现代化生活冲击下大量技艺面临失传风险，保护能够留住独一无二的手工技艺；第三，非遗具备极高文化与经济价值，可衍生文创、文旅产业，带动地方文化发展；第四，传承非遗能够增强文化自信，让年轻一代读懂本土传统文化，延续东方文脉。",
        "四大名绣分别是什么": "中国四大名绣为苏绣、湘绣、粤绣、蜀绣。苏绣产自江苏苏州，线条细腻雅致，擅长花鸟山水，配色柔和温润；湘绣出自湖南长沙，以狮虎猛兽为特色，针法粗犷写实；粤绣包含广绣与潮绣，色彩浓烈华丽，多用金银线刺绣，装饰性极强；蜀绣来自四川成都，题材多为锦鲤、芙蓉，针法厚重柔和，充满西南地域韵味。四者针法、配色、题材各有鲜明地域特色，是中式刺绣艺术的巅峰代表。",
        "剪纸有什么寓意": "剪纸是民间祈福民俗载体，不同纹样寓意各不相同。锦鲤剪纸代表年年有余，牡丹象征富贵吉祥，喜鹊登梅寓意喜上眉梢，石榴纹样代表多子多福，福字窗花驱邪纳福，十二生肖剪纸对应生肖祈福。剪纸多用于春节、婚嫁、乔迁等喜庆场合，一张红纸折叠雕琢，将百姓对美好生活的期盼融入纹样，是最接地气的民间美术。",
        "传统陶艺工艺讲解": "古法陶艺完整流程分为揉泥、醒泥、拉坯、修坯、雕刻装饰、晾干、上釉、入窑烧制八大工序。匠人先反复揉搓泥土去除气泡，在转盘上拉制器物基础造型，精细修去毛边后雕刻花纹，自然阴干后均匀涂刷矿物釉料，最后送入窑中经上千度高温烧制。泥土经烈火淬炼化为温润瓷器，每一件成品纹理、釉色都独一无二，承载中国人温润内敛的审美追求。",
        "东阳木雕介绍": "东阳木雕是国家级非遗传统木雕技艺，产自浙江东阳，以天然硬木为原料，分为浅浮雕、深雕、镂空多层雕三大工艺。匠人以刻刀替代笔墨，层层雕琢山水、瑞兽、花鸟、戏曲人物，层次繁复细腻。古代多用于古建筑门窗、古典桌椅、屏风装饰，构图饱满大气，雕刻细节精巧，是中式传统雕刻艺术的标杆门类。",
        "扎染工艺是什么": "扎染古称绞缬，是少数民族传统印染非遗。以天然棉麻布料为载体，通过捆扎、折叠、缝合等方式固定布料，再使用板蓝根等天然植物染料反复浸染，捆扎处无法上色，自然形成不规则晕染纹理。每一块布料花纹都无法复刻，充满自然随性的美感，如今广泛运用于服饰、文创、家居布艺，承载少数民族民俗文化记忆。",
        "戏曲脸谱色彩含义": "戏曲脸谱以色彩区分人物性格与善恶：红色代表忠勇正义，如关羽；黑色代表刚正耿直，如包拯；白色代表奸诈阴险，如曹操；蓝色代表桀骜勇猛，如窦尔敦；金色银色用于神仙、妖魔角色。匠人手工调配矿物颜料勾勒面部纹路，一笔一画贴合人物身份，是中华戏曲独有的视觉符号，也是戏曲文化最具辨识度的非遗元素。",
        "传统节日属于非遗吗": "我国春节、清明、端午、七夕、中秋、重阳六大传统节日全部列入国家级非物质文化遗产。传统节日融合民俗祭祀、饮食习俗、歌舞游艺、礼仪活动，是综合性活态非遗。端午赛龙舟、中秋赏月吃月饼、重阳登高敬老，整套习俗代代延续，凝聚中国人团圆、孝道、感恩的传统精神内核。",
        "榫卯家具非遗特点": "传统榫卯家具是古代木工非遗技艺，全程不使用一颗钉子，依靠木材凹凸咬合结构拼接成型。榫卯种类多达上百种，可承受百年使用而稳固不散，兼具力学智慧与简约美学。匠人仅凭卷尺、刻刀、刨子完成整套家具制作，体现古人天人合一、顺势而为的造物哲学，是中式传统工艺的智慧结晶。",
        "皮影戏介绍": "皮影戏又称灯影戏，是传统戏曲类非遗。以兽皮雕刻人物、道具剪影，借灯光投射幕布，艺人手持操纵杆配合唱腔、锣鼓伴奏演绎故事。题材多取自历史演义、民间传说，集雕刻、绘画、戏曲、音乐于一体，曾是古代民间最主流的娱乐形式，如今各地保留不同地域唱腔与雕刻风格。",
        "非遗如何传承": "非遗传承分为三种核心路径：一是师徒口传心授传统师承模式，老匠人带徒完整传授全套手艺；二是校园普及，中小学、高校开设非遗课程、手工社团，向青少年普及技艺；三是数字化传承，通过拍摄工艺视频、线上数字展馆、AI问答等方式永久留存技艺资料；四是市场化创新，结合文创、文旅、短视频扩大非遗传播，让传统手艺适配现代生活。"
    };

    function sendMsg() {
        const input = document.getElementById("userInput");
        const chatBox = document.getElementById("chatBox");
        const text = input.value.trim();
        if (!text) return;
        // 输出用户提问气泡
        const userDiv = document.createElement("div");
        userDiv.className = "message user-message";
        userDiv.innerText = text;
        chatBox.appendChild(userDiv);
        input.value = "";
        // 匹配回答
        let reply = "抱歉，暂时没有收录该问题相关内容，你可以尝试提问：非遗定义、四大名绣、剪纸、陶艺、木雕、扎染、戏曲脸谱、传统节日、榫卯家具、皮影戏、非遗保护、传承方式等相关内容。";
        for(let key in answerLib){
            if(text.includes(key)){
                reply = answerLib[key];
                break;
            }
        }
        // 延迟输出机器人回复，模拟真实对话
        setTimeout(()=>{
            const botDiv = document.createElement("div");
            botDiv.className = "message bot-message";
            botDiv.innerText = reply;
            chatBox.appendChild(botDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }, 600);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
    // 回车发送
    document.getElementById("userInput").addEventListener("keydown",function(e){
        if(e.key === "Enter") sendMsg();
    })
</script>
</body>
</html>
